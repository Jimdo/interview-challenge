services:
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interview
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d interview" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - ./tmp/postgresql:/var/lib/postgresql/data
    ports:
      - "5432:5432"
